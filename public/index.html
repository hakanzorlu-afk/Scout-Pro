<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SCOUT PRO">
<title>SCOUT PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080e1a;--s1:#0f1829;--s2:#162035;--s3:#1e2d47;
  --border:#1e3a5f;--border2:#2a4a72;
  --green:#00ff87;--green2:rgba(0,255,135,.12);--green3:rgba(0,255,135,.06);
  --yellow:#ffd60a;--yellow2:rgba(255,214,10,.12);
  --red:#ff3b3b;--red2:rgba(255,59,59,.12);
  --orange:#ff8c00;--orange2:rgba(255,140,0,.12);
  --purple:#bf5fff;--purple2:rgba(191,95,255,.12);
  --blue:#00b4ff;--blue2:rgba(0,180,255,.12);
  --text:#e8f4fd;--text2:#7aa3c8;--text3:#3d6080;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
.app{display:flex;flex-direction:column;height:100%;}

/* HEADER */
.hdr{
  background:linear-gradient(180deg,#0a1220 0%,#080e1a 100%);
  padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;
  position:relative;
}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:.4;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:3px;color:#fff;}
.logo span{color:var(--green);text-shadow:0 0 20px rgba(0,255,135,.5);}
.spill{display:flex;align-items:center;gap:8px;background:var(--s1);
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:sdotPulse 2s infinite;flex-shrink:0;}
.sdot.err{background:var(--red);box-shadow:0 0 8px var(--red);animation:none;}
.sdot.load{background:var(--yellow);box-shadow:0 0 8px var(--yellow);}
@keyframes sdotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(.8);}}
.stxt{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:1px;}

/* ALARM */
.alarm-wrap{flex-shrink:0;overflow:hidden;max-height:0;transition:max-height .5s ease;}
.alarm-wrap.open{max-height:500px;}
.alarm-box{margin:10px 12px 2px;
  background:linear-gradient(135deg,rgba(255,59,59,.08),rgba(255,59,59,.04));
  border:1.5px solid var(--red);border-radius:16px;padding:14px;
  position:relative;overflow:hidden;}
.alarm-box::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,59,59,.03) 10px,rgba(255,59,59,.03) 11px);}
.alarm-hdr{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:2px;color:var(--red);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;position:relative;}
.blink{animation:blink .5s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.alarm-glow{position:absolute;inset:-14px;background:radial-gradient(ellipse at center,rgba(255,59,59,.08) 0%,transparent 70%);pointer-events:none;animation:alarmGlow 1.5s infinite;}
@keyframes alarmGlow{0%,100%{opacity:.5;}50%{opacity:1;}}
.alarm-item{background:rgba(0,0,0,.3);border:1px solid rgba(255,59,59,.2);
  border-radius:10px;padding:11px 13px;margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;position:relative;}
.alarm-item:last-child{margin-bottom:0;}
.alarm-teams{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;}
.alarm-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);margin-top:3px;}
.alarm-tags{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.atag{font-family:'DM Mono',monospace;font-size:8px;font-weight:700;
  padding:3px 8px;border-radius:5px;letter-spacing:.5px;}
.atag.iy{background:var(--yellow);color:#000;}
.atag.htft{background:var(--purple);color:#fff;}

/* NAV */
.nav{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 8px 10px;border:none;background:none;cursor:pointer;
  color:var(--text3);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;
  transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px;position:relative;}
.ntab .ni{font-size:22px;transition:filter .2s;}
.ntab.active.tiy{color:var(--yellow);border-bottom-color:var(--yellow);}
.ntab.active.tiy .ni{filter:drop-shadow(0 0 6px var(--yellow));}
.ntab.active.thtft{color:var(--purple);border-bottom-color:var(--purple);}
.ntab.active.thtft .ni{filter:drop-shadow(0 0 6px var(--purple));}

/* PAGES */
.page{display:none;flex:1;overflow:hidden;flex-direction:column;}
.page.active{display:flex;}
.pscroll{flex:1;overflow-y:auto;padding:14px;}
.pscroll::-webkit-scrollbar{width:2px;}
.pscroll::-webkit-scrollbar-thumb{background:var(--border2);}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:20px;}
.spin{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--green);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);
  text-align:center;line-height:2.4;letter-spacing:.5px;}

/* MATCH CARD */
.mcard{background:var(--s1);border:1px solid var(--border);border-radius:16px;
  margin-bottom:14px;overflow:hidden;transition:border-color .3s;}
.mcard.isTop{border-color:var(--green);box-shadow:0 0 24px rgba(0,255,135,.08);}
.mcard.isAlarm{border-color:var(--red);box-shadow:0 0 24px rgba(255,59,59,.12);}
.mcard.isMid{border-color:var(--yellow);}

/* CARD HEADER */
.chdr{padding:11px 15px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;background:var(--s2);}
.cleague{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);
  letter-spacing:1px;display:flex;align-items:center;gap:6px;}
.ctime{font-family:'DM Mono',monospace;font-size:11px;color:var(--yellow);font-weight:500;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);
  box-shadow:0 0 6px var(--red);animation:sdotPulse .8s infinite;flex-shrink:0;}

/* TEAMS */
.cteams{padding:18px 16px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);}
.team{flex:1;text-align:center;}
.tname{font-family:'Syne',sans-serif;font-size:clamp(12px,3.8vw,16px);
  font-weight:700;color:var(--text);line-height:1.3;}
.cvs{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;
  color:var(--text3);letter-spacing:3px;flex-shrink:0;padding:0 4px;}

/* MAIN SIGNAL */
.msig{padding:16px;}
.msig-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.msig-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);}
.msig-badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:700;
  padding:4px 12px;border-radius:20px;}
.msig-badge.g{background:var(--green2);color:var(--green);border:1px solid rgba(0,255,135,.2);}
.msig-badge.y{background:var(--yellow2);color:var(--yellow);border:1px solid rgba(255,214,10,.2);}
.msig-badge.r{background:var(--red2);color:var(--red);border:1px solid rgba(255,59,59,.2);}

/* BIG PERCENT */
.bigpct{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;line-height:1;margin-bottom:4px;}
.bigpct.g{color:var(--green);text-shadow:0 0 30px rgba(0,255,135,.3);}
.bigpct.y{color:var(--yellow);text-shadow:0 0 30px rgba(255,214,10,.3);}
.bigpct.r{color:var(--red);text-shadow:0 0 30px rgba(255,59,59,.3);}
.bigpct-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:14px;}

/* PROG BAR */
.pbar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:14px;}
.pbarfill{height:100%;border-radius:3px;transition:width 1.4s cubic-bezier(.4,0,.2,1);}

/* REASON */
.reason{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.reason-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--text3);margin-bottom:8px;}
.reason-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--border);}
.reason-row:last-child{border-bottom:none;}
.rl{font-size:11px;color:var(--text2);}
.rv{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}

/* STAT ROW */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sbox{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px;}
.sbox-l{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1px;color:var(--text3);margin-bottom:4px;}
.sbox-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.sbox-s{font-size:9px;color:var(--text3);margin-top:2px;}

/* HTFT */
.htft-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text3);
  margin-bottom:10px;padding-top:4px;}
.htft-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.hcell{background:var(--s2);border:1px solid var(--border);border-radius:12px;
  padding:14px;text-align:center;transition:border-color .3s;}
.hcell.h12{border-color:var(--orange);background:var(--orange2);}
.hcell.h21{border-color:var(--purple);background:var(--purple2);}
.htag{display:inline-block;font-family:'DM Mono',monospace;font-size:7px;font-weight:700;
  padding:2px 7px;border-radius:4px;margin-bottom:8px;letter-spacing:1px;}
.htag.t12{background:var(--orange);color:#000;}
.htag.t21{background:var(--purple);color:#fff;}
.hcombo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:5px;}
.hcombo.c12{color:var(--orange);}
.hcombo.c21{color:var(--purple);}
.hcombo.cx{color:var(--text2);}
.hprob{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;}
.hdesc{font-size:9px;color:var(--text2);margin-top:5px;line-height:1.5;}
.hbar{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:10px;}
.hbarfill{height:100%;border-radius:2px;}

/* DISC */
.disc{background:var(--yellow2);border:1px solid rgba(255,214,10,.15);
  border-radius:10px;padding:11px 13px;font-size:10px;color:var(--yellow);
  line-height:1.8;margin-bottom:12px;}

/* EMPTY / ERROR */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;gap:16px;text-align:center;padding:30px;}
.ei{font-size:56px;opacity:.25;}
.et{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text2);}
.es{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);line-height:2.4;letter-spacing:.5px;}
.errbox{padding:16px;background:var(--red2);border:1px solid rgba(255,59,59,.25);
  border-radius:14px;font-size:11px;color:var(--red);line-height:1.9;}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
.sec-cnt{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);
  background:var(--s1);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">SCOUT <span>PRO</span></div>
    <div class="spill">
      <div class="sdot load" id="sdot"></div>
      <div class="stxt" id="stxt">YUKLENIYOR</div>
    </div>
  </div>

  <div class="alarm-wrap" id="alarmWrap">
    <div class="alarm-box">
      <div class="alarm-glow"></div>
      <div class="alarm-hdr">
        <span class="blink">🚨</span> BUGUN KESINLIKLE OYNA <span class="blink">🚨</span>
      </div>
      <div id="alarmItems"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="ntab tiy active" onclick="switchTab('iy',this)">
      <span class="ni">⚡</span>IY 1.5 UST
    </button>
    <button class="ntab thtft" onclick="switchTab('htft',this)">
      <span class="ni">🔄</span>HT/FT 1/2·2/1
    </button>
  </nav>

  <div class="page active" id="page-iy">
    <div class="pscroll" id="iy-scroll">
      <div class="loader"><div class="spin"></div>
        <div class="load-txt">MACLAR YUKLENIYOR...<br>POISSON MODELI HAZIRLANIYOR...<br>IY 1.5 ANALIZI YAPILIYOR...</div>
      </div>
    </div>
  </div>

  <div class="page" id="page-htft">
    <div class="pscroll" id="htft-scroll">
      <div class="loader"><div class="spin"></div>
        <div class="load-txt">HT/FT MATRISI HAZIRLANIYOR...<br>TERSINE DONUS ANALIZI...<br>EN GUCLU KOMBINASYONLAR...</div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

const ALLSPORTS_KEY = '4e08044782b7be2b26360d428b664d8697df4d2dcff2e769ee5e789dfb1eb22a';

// ══ POISSON ══
function poi(l,k){let r=Math.exp(-l);for(let i=1;i<=k;i++)r*=l/i;return r;}

function analyze(hFor, aFor, hAg, aAg){
  const avg=1.42;
  const lH=Math.max((hFor||1.4)*((aAg||1.35)/avg),.3);
  const lA=Math.max((aFor||1.15)*((hAg||1.35)/avg),.2);

  let hw=0,dr=0,aw=0,ov25=0,btts=0,iy15=0;
  const ft={},ht={};
  for(let h=0;h<=6;h++)for(let a=0;a<=6;a++){
    const p=poi(lH,h)*poi(lA,a);ft[`${h}-${a}`]=p;
    if(h>a)hw+=p;else if(h===a)dr+=p;else aw+=p;
    if(h+a>2.5)ov25+=p;if(h>0&&a>0)btts+=p;
  }
  for(let h=0;h<=3;h++)for(let a=0;a<=3;a++){
    const p=poi(lH*.44,h)*poi(lA*.44,a);ht[`${h}-${a}`]=p;
    if(h+a>=2)iy15+=p;
  }
  const htft={};
  ['1','X','2'].forEach(hr=>['1','X','2'].forEach(fr=>htft[`${hr}/${fr}`]=0));
  const htS=Object.values(ht).reduce((a,b)=>a+b,0)||1;
  const ftS=Object.values(ft).reduce((a,b)=>a+b,0)||1;
  Object.entries(ht).forEach(([hs,hp])=>{
    const[hh,ha]=hs.split('-').map(Number),hr=hh>ha?'1':hh===ha?'X':'2';
    Object.entries(ft).forEach(([fs,fp])=>{
      const[fh,fa]=fs.split('-').map(Number),fr=fh>fa?'1':fh===fa?'X':'2';
      htft[`${hr}/${fr}`]+=(hp/htS)*(fp/ftS);
    });
  });
  const tot=Object.values(htft).reduce((a,b)=>a+b,0)||1;
  const htftN={};
  Object.entries(htft).forEach(([k,v])=>htftN[k]=+(v/tot*100).toFixed(2));
  return{
    lH:+lH.toFixed(3),lA:+lA.toFixed(3),
    hw:+(hw*100).toFixed(1),dr:+(dr*100).toFixed(1),aw:+(aw*100).toFixed(1),
    ov25:+(ov25*100).toFixed(1),btts:+(btts*100).toFixed(1),iy15:+(iy15*100).toFixed(1),
    hScore:+((1-poi(lH,0))*100).toFixed(1),aScore:+((1-poi(lA,0))*100).toFixed(1),htftN,
  };
}

// ══ STATE ══
let matches=[], analyzed=[];

// ══ UI ══
function switchTab(tab,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  btn.classList.add('active');
}

function setStatus(state,txt){
  const d=document.getElementById('sdot'),s=document.getElementById('stxt');
  s.textContent=txt;
  d.className='sdot'+(state==='ok'?'':state==='err'?' err':' load');
}

// ══ LOAD ══
async function load(){
  setStatus('load','YUKLENIYOR');
  try{
    const now=new Date();
    const tr=new Date(now.getTime()+3*60*60*1000);
    const date=tr.toISOString().split('T')[0];

    const proxy='https://api.allorigins.win/raw?url=';
    const apiUrl=`https://allsportsapi.com/api/football/?met=Fixtures&APIkey=${ALLSPORTS_KEY}&from=${date}&to=${date}`;
    const r=await fetch(proxy+encodeURIComponent(apiUrl));
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(!data.success)throw new Error(data.message||'API hatasi');

    matches=(data.result||[]).filter(m=>m.event_status!=='Finished').map(m=>{
      let time='?';
      if(m.event_date&&m.event_time){
        try{
          const dt=new Date(m.event_date+'T'+m.event_time+':00Z');
          time=dt.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Istanbul'});
        }catch(e){time=m.event_time;}
      }
      const es=m.event_status||'';
      const isLive=!isNaN(parseInt(es))||es==='HT';
      return{
        id:String(m.event_key),
        league:m.league_name||'?',
        country:m.country_name||'',
        home:m.event_home_team||'?',
        away:m.event_away_team||'?',
        time,isLive,
        minute:!isNaN(parseInt(es))?parseInt(es):(es==='HT'?45:null),
      };
    });

    setStatus('ok',`${matches.length} MAC`);

    // Analyze with default stats (real stats require team API)
    analyzed=matches.map(m=>{
      const p=analyze(1.4,1.15,1.35,1.4);
      return{m,p};
    });

    buildAlarm();
    renderIY();
    renderHTFT();
  }catch(err){
    setStatus('err','HATA');
    const e=`<div class="errbox">⚠ ${err.message}<br><br>Lutfen sayfayi yenile. Sorun devam ederse internet baglantini kontrol et.</div>`;
    document.getElementById('iy-scroll').innerHTML=e;
    document.getElementById('htft-scroll').innerHTML=e;
  }
}

// ══ ALARM ══
function buildAlarm(){
  const strong=analyzed.filter(x=>x.p.iy15>=58||(x.p.htftN['1/2']||0)+(x.p.htftN['2/1']||0)>=13);
  if(!strong.length)return;
  const top=strong.sort((a,b)=>{
    const sa=Math.max(a.p.iy15,(a.p.htftN['1/2']||0)+(a.p.htftN['2/1']||0));
    const sb=Math.max(b.p.iy15,(b.p.htftN['1/2']||0)+(b.p.htftN['2/1']||0));
    return sb-sa;
  }).slice(0,3);
  document.getElementById('alarmItems').innerHTML=top.map(x=>{
    const tags=[];
    if(x.p.iy15>=58)tags.push(`<span class="atag iy">IY UST 1.5 — %${Math.round(x.p.iy15)}</span>`);
    const rev=(x.p.htftN['1/2']||0)+(x.p.htftN['2/1']||0);
    if(rev>=13)tags.push(`<span class="atag htft">HTFT DONUS — %${rev.toFixed(1)}</span>`);
    return`<div class="alarm-item">
      <div><div class="alarm-teams">${x.m.home} — ${x.m.away}</div>
      <div class="alarm-meta">${x.m.league} · ${x.m.time}</div></div>
      <div class="alarm-tags">${tags.join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('alarmWrap').classList.add('open');
}

// ══ IY 1.5 RENDER ══
function renderIY(){
  const cont=document.getElementById('iy-scroll');
  const sorted=[...analyzed].sort((a,b)=>b.p.iy15-a.p.iy15);
  if(!sorted.length){
    cont.innerHTML=`<div class="empty"><div class="ei">⚡</div><div class="et">Mac bulunamadi</div><div class="es">BUGÜN ANALIZ EDILECEK MAC YOK<br>DAHA SONRA TEKRAR KONTROL ET</div></div>`;
    return;
  }
  const cards=sorted.map(({m,p})=>{
    const c=p.iy15;
    const cls=c>=65?'g':c>=50?'y':'r';
    const cardCls=c>=70?'isAlarm':c>=60?'isTop':c>=50?'isMid':'';
    const badge=c>=70?'🚨 COK GUCLU':c>=60?'✅ GUCLU':c>=50?'⚡ ORTA':'⚠ ZAYIF';
    const fillClr=c>=65?'var(--green)':c>=50?'var(--yellow)':'var(--red)';

    return`<div class="mcard ${cardCls}">
      <div class="chdr">
        <div class="cleague">${m.isLive?'<div class="live-dot"></div>':''} ${m.country?m.country+' ·':''} ${m.league}</div>
        <div class="ctime">${m.isLive?'🔴 CANLI '+(m.minute?m.minute+"'":''): m.time}</div>
      </div>
      <div class="cteams">
        <div class="team"><div class="tname">${m.home}</div></div>
        <div class="cvs">VS</div>
        <div class="team"><div class="tname">${m.away}</div></div>
      </div>
      <div class="msig">
        <div class="msig-top">
          <div class="msig-label">IY 1.5 UST OLASILIGI</div>
          <div class="msig-badge ${cls}">${badge}</div>
        </div>
        <div class="bigpct ${cls}">${Math.round(c)}%</div>
        <div class="bigpct-sub">ILKYARI 2 GOL IHTIMALI</div>
        <div class="pbar"><div class="pbarfill" style="width:0%;background:${fillClr}" data-w="${Math.min(Math.round(c),95)}%"></div></div>
        <div class="reason">
          <div class="reason-title">ANALIZ DETAYLARI</div>
          <div class="reason-row"><div class="rl">Ev IY Lambda (λ)</div><div class="rv" style="color:var(--green)">${(p.lH*.44).toFixed(3)}</div></div>
          <div class="reason-row"><div class="rl">Dep IY Lambda (λ)</div><div class="rv" style="color:var(--blue)">${(p.lA*.44).toFixed(3)}</div></div>
          <div class="reason-row"><div class="rl">Toplam IY Lambda</div><div class="rv" style="color:var(--yellow)">${(p.lH*.44+p.lA*.44).toFixed(3)}</div></div>
          <div class="reason-row"><div class="rl">Ev gol atar ihtimali</div><div class="rv" style="color:var(--green)">${p.hScore}%</div></div>
          <div class="reason-row"><div class="rl">Dep gol atar ihtimali</div><div class="rv" style="color:var(--blue)">${p.aScore}%</div></div>
          <div class="reason-row"><div class="rl">Tam mac UST 2.5</div><div class="rv" style="color:var(--orange)">${p.ov25}%</div></div>
          <div class="reason-row"><div class="rl">KG Var ihtimali</div><div class="rv" style="color:var(--purple)">${p.btts}%</div></div>
        </div>
        <div class="stats">
          <div class="sbox"><div class="sbox-l">EV KAZANMA</div><div class="sbox-v" style="color:var(--green)">${p.hw}%</div><div class="sbox-s">${m.home}</div></div>
          <div class="sbox"><div class="sbox-l">BERABERLIK</div><div class="sbox-v" style="color:var(--yellow)">${p.dr}%</div><div class="sbox-s">Ayni skor</div></div>
          <div class="sbox"><div class="sbox-l">DEP KAZANMA</div><div class="sbox-v" style="color:var(--blue)">${p.aw}%</div><div class="sbox-s">${m.away}</div></div>
          <div class="sbox"><div class="sbox-l">EV LAMBDA (TAM)</div><div class="sbox-v" style="color:var(--text2)">${p.lH}</div><div class="sbox-s">Beklenen gol</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  cont.innerHTML=`
    <div class="sec-hdr">
      <div class="sec-title" style="color:var(--yellow)">⚡ IY 1.5 Ust</div>
      <div class="sec-cnt">${sorted.length} MAC</div>
    </div>
    <div class="disc">En yuksek IY gol beklentili maclar yukarida. <b>%60 uzeri</b> guclu sinyal, <b>%70 uzeri</b> cok guclu sinyal sayilir.</div>
    ${cards}`;
  setTimeout(()=>document.querySelectorAll('[data-w]').forEach(el=>el.style.width=el.dataset.w),150);
}

// ══ HTFT RENDER ══
function renderHTFT(){
  const cont=document.getElementById('htft-scroll');
  const scored=[...analyzed].map(x=>({
    ...x, rev:(x.p.htftN['1/2']||0)+(x.p.htftN['2/1']||0)
  })).sort((a,b)=>b.rev-a.rev);

  if(!scored.length){
    cont.innerHTML=`<div class="empty"><div class="ei">🔄</div><div class="et">Mac bulunamadi</div></div>`;
    return;
  }

  const cards=scored.map(({m,p,rev})=>{
    const p12=p.htftN['1/2']||0,p21=p.htftN['2/1']||0;
    const p11=p.htftN['1/1']||0,p22=p.htftN['2/2']||0;
    const px1=p.htftN['X/1']||0,px2=p.htftN['X/2']||0;
    const best=p12>p21?'1/2':'2/1',bestP=Math.max(p12,p21);
    const maxAll=Math.max(p12,p21,p11,p22,px1,px2,.01);
    const cardCls=rev>=14?'isAlarm':rev>=11?'isTop':rev>=8?'isMid':'';
    const cls=rev>=14?'g':rev>=10?'y':'r';
    const badge=rev>=14?'🚨 COK GUCLU':rev>=11?'✅ GUCLU':rev>=8?'⚡ ORTA':'⚠ ZAYIF';
    const fillClr=rev>=14?'var(--green)':rev>=10?'var(--yellow)':'var(--red)';

    return`<div class="mcard ${cardCls}">
      <div class="chdr">
        <div class="cleague">${m.isLive?'<div class="live-dot"></div>':''} ${m.country?m.country+' ·':''} ${m.league}</div>
        <div class="ctime">${m.isLive?'🔴 CANLI '+(m.minute?m.minute+"'":''): m.time}</div>
      </div>
      <div class="cteams">
        <div class="team"><div class="tname">${m.home}</div></div>
        <div class="cvs">VS</div>
        <div class="team"><div class="tname">${m.away}</div></div>
      </div>
      <div class="msig">
        <div class="msig-top">
          <div class="msig-label">TERSINE DONUS (1/2 + 2/1)</div>
          <div class="msig-badge ${cls}">${badge}</div>
        </div>
        <div class="bigpct ${cls}">${rev.toFixed(1)}%</div>
        <div class="bigpct-sub">TOPLAM DONUS OLASILIGI</div>
        <div class="pbar"><div class="pbarfill" style="width:0%;background:${fillClr}" data-w="${Math.min(Math.round(rev*4),95)}%"></div></div>
        <div class="reason">
          <div class="reason-title">EN iYi KOMBINASYON: ${best} — %${bestP.toFixed(1)}</div>
          <div class="reason-row">
            <div class="rl">1/2 — IY: ${m.home} onde → MS: ${m.away} kazanir</div>
            <div class="rv" style="color:var(--orange)">%${p12.toFixed(1)}</div>
          </div>
          <div class="reason-row">
            <div class="rl">2/1 — IY: ${m.away} onde → MS: ${m.home} kazanir</div>
            <div class="rv" style="color:var(--purple)">%${p21.toFixed(1)}</div>
          </div>
          <div class="reason-row"><div class="rl">Ev Lambda (λ)</div><div class="rv" style="color:var(--green)">${p.lH}</div></div>
          <div class="reason-row"><div class="rl">Dep Lambda (λ)</div><div class="rv" style="color:var(--blue)">${p.lA}</div></div>
          <div class="reason-row"><div class="rl">Lambda farki</div><div class="rv" style="color:var(--yellow)">${Math.abs(p.lH-p.lA).toFixed(3)}</div></div>
        </div>
        <div class="htft-title">TUM HT/FT KOMBINASYONLARI</div>
        <div class="htft-grid">
          <div class="hcell h12">
            <div class="htag t12">★ DONUS</div>
            <div class="hcombo c12">1/2</div>
            <div class="hprob" style="color:var(--orange)">%${p12.toFixed(1)}</div>
            <div class="hdesc">IY: ${m.home}<br>MS: ${m.away}</div>
            <div class="hbar"><div class="hbarfill" style="width:0%;background:var(--orange)" data-w="${Math.round(p12/maxAll*100)}%"></div></div>
          </div>
          <div class="hcell h21">
            <div class="htag t21">★ DONUS</div>
            <div class="hcombo c21">2/1</div>
            <div class="hprob" style="color:var(--purple)">%${p21.toFixed(1)}</div>
            <div class="hdesc">IY: ${m.away}<br>MS: ${m.home}</div>
            <div class="hbar"><div class="hbarfill" style="width:0%;background:var(--purple)" data-w="${Math.round(p21/maxAll*100)}%"></div></div>
          </div>
          <div class="hcell">
            <div class="hcombo cx">1/1</div>
            <div class="hprob">%${p11.toFixed(1)}</div>
            <div class="hdesc">IY ve MS<br>${m.home}</div>
            <div class="hbar"><div class="hbarfill" style="width:0%;background:var(--green)" data-w="${Math.round(p11/maxAll*100)}%"></div></div>
          </div>
          <div class="hcell">
            <div class="hcombo cx">2/2</div>
            <div class="hprob">%${p22.toFixed(1)}</div>
            <div class="hdesc">IY ve MS<br>${m.away}</div>
            <div class="hbar"><div class="hbarfill" style="width:0%;background:var(--blue)" data-w="${Math.round(p22/maxAll*100)}%"></div></div>
          </div>
          <div class="hcell">
            <div class="hcombo cx">X/1</div>
            <div class="hprob">%${px1.toFixed(1)}</div>
            <div class="hdesc">IY: Bera<br>MS: ${m.home}</div>
            <div class="hbar"><div class="hbarfill" style="width:0%;background:var(--text2)" data-w="${Math.round(px1/maxAll*100)}%"></div></div>
          </div>
          <div class="hcell">
            <div class="hcombo cx">X/2</div>
            <div class="hprob">%${px2.toFixed(1)}</div>
            <div class="hdesc">IY: Bera<br>MS: ${m.away}</div>
            <div class="hbar"><div class="hbarfill" style="width:0%;background:var(--text2)" data-w="${Math.round(px2/maxAll*100)}%"></div></div>
          </div>
        </div>
        <div class="disc">⚠ 1/2 ve 2/1 yuksek oran tasiyan riskli bahislerdir. Sadece guclu sinyal (✅) gordugunuzde oynamanizi oneririz.</div>
      </div>
    </div>`;
  }).join('');

  cont.innerHTML=`
    <div class="sec-hdr">
      <div class="sec-title" style="color:var(--purple)">🔄 HT/FT Donus</div>
      <div class="sec-cnt">${scored.length} MAC</div>
    </div>
    <div class="disc">Tersine donus kombinasyonlari — <b>1/2</b> ve <b>2/1</b>. Yuksek oran, yuksek risk. Sadece en guclu sinyalleri oyna.</div>
    ${cards}`;
  setTimeout(()=>document.querySelectorAll('[data-w]').forEach(el=>el.style.width=el.dataset.w),150);
}

load();
</script>
</body>
</html>
