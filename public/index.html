<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a6b3a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SCOUT PRO">
<link rel="manifest" href="/manifest.json">
<title>SCOUT PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--surface:#fff;--card:#fff;--card2:#f7fafc;
  --border:#e2e8f0;--border2:#cbd5e0;
  --green:#1a6b3a;--green2:#22c55e;--green3:#dcfce7;
  --yellow:#d97706;--yellow2:#fef3c7;
  --red:#dc2626;--red2:#fee2e2;
  --blue:#1d4ed8;--blue2:#dbeafe;
  --orange:#ea580c;--orange2:#ffedd5;
  --purple:#7c3aed;--purple2:#ede9fe;
  --teal:#0d9488;--teal2:#ccfbf1;
  --pink:#db2777;--pink2:#fce7f3;
  --text:#1a202c;--text2:#4a5568;--text3:#718096;--muted:#a0aec0;
  --shadow:0 1px 3px rgba(0,0,0,.1);
  --shadow2:0 4px 6px rgba(0,0,0,.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
.app{display:flex;flex-direction:column;height:100%;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;
  background:var(--green);flex-shrink:0;box-shadow:var(--shadow2);}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:2px;color:#fff;}
.logo span{color:var(--green2);}
.status{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;
  color:rgba(255,255,255,.85);letter-spacing:1px;}
.pdot{width:8px;height:8px;background:#22c55e;border-radius:50%;border:2px solid rgba(255,255,255,.4);animation:pu 2s infinite;}
@keyframes pu{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5);}50%{box-shadow:0 0 0 5px rgba(34,197,94,0);}}

/* NAV */
.nav{display:flex;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.ntab{flex:1;min-width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 3px 7px;border:none;background:none;color:var(--text3);font-family:'DM Mono',monospace;
  font-size:7px;letter-spacing:.5px;cursor:pointer;transition:all .2s;border-bottom:3px solid transparent;
  margin-bottom:-2px;gap:3px;white-space:nowrap;}
.ntab .ni{font-size:15px;}
.ntab.active{color:var(--green);border-bottom-color:var(--green);font-weight:600;}
.ntab.active.t1{color:var(--teal);border-bottom-color:var(--teal);}
.ntab.active.t2{color:var(--yellow);border-bottom-color:var(--yellow);}
.ntab.active.t3{color:var(--orange);border-bottom-color:var(--orange);}
.ntab.active.t4{color:var(--purple);border-bottom-color:var(--purple);}
.ntab.active.t5{color:var(--pink);border-bottom-color:var(--pink);}
.ntab.active.tlive{color:var(--red);border-bottom-color:var(--red);}

/* PAGES */
.page{display:none;flex:1;overflow:hidden;flex-direction:column;}
.page.active{display:flex;}

/* SPLIT */
.split{display:flex;flex:1;overflow:hidden;}
.mcol{width:260px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.coltop{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card2);}
.ctitle{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--green);margin-bottom:8px;}
.drow{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.drow::-webkit-scrollbar{display:none;}
.dchip{flex-shrink:0;padding:5px 11px;background:#fff;border:1.5px solid var(--border2);border-radius:20px;
  color:var(--text2);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.dchip.active{background:var(--green);color:#fff;border-color:var(--green);font-weight:600;}
.mlist{flex:1;overflow-y:auto;}
.mlist::-webkit-scrollbar{width:3px;}
.mlist::-webkit-scrollbar-thumb{background:var(--border2);}
.lghdr{padding:6px 12px;background:var(--card2);font-family:'DM Mono',monospace;font-size:8px;
  letter-spacing:1px;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.mitem{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;}
.mitem:hover{background:var(--card2);}
.mitem.active{background:var(--green3);border-left:3px solid var(--green);}
.mitem.live-item{background:#fff5f5;border-left:3px solid var(--red);}
.mt{font-family:'DM Mono',monospace;font-size:9px;color:var(--yellow);margin-bottom:3px;
  display:flex;align-items:center;gap:6px;font-weight:500;}
.live-badge{background:var(--red);color:#fff;font-size:7px;font-weight:700;padding:1px 5px;
  border-radius:3px;letter-spacing:1px;animation:pu .8s infinite;}
.mh{font-size:13px;font-weight:600;color:var(--text);}
.ma{font-size:12px;color:var(--text2);margin-top:1px;}
.mmatch-count{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:7px 12px;
  text-align:center;background:var(--card2);border-bottom:1px solid var(--border);}

/* ANALYSIS */
.acol{flex:1;overflow-y:auto;background:var(--bg);}
.acol::-webkit-scrollbar{width:4px;}
.acol::-webkit-scrollbar-thumb{background:var(--border2);}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;
  gap:14px;color:var(--text3);padding:30px;text-align:center;}
.ei{font-size:52px;opacity:.4;}
.et{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text2);}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ldov{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;}
.ldov.show{display:flex;}
.steplist{display:flex;flex-direction:column;gap:8px;}
.si{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);transition:color .3s;}
.si.done{color:var(--green);}.si.act{color:var(--yellow);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.si.done .sdot{background:var(--green);}.si.act .sdot{background:var(--yellow);animation:pu .8s infinite;}

/* HERO */
.mhero{padding:18px;background:#fff;border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
.hmeta{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:14px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.hmeta-tag{background:var(--card2);border:1px solid var(--border);padding:2px 8px;border-radius:20px;}
.hvs{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.hteam{flex:1;text-align:center;}
.hname{font-family:'Syne',sans-serif;font-size:clamp(12px,2.5vw,18px);font-weight:700;color:var(--text);}
.frow{display:flex;gap:3px;justify-content:center;margin-top:7px;}
.fb{width:20px;height:20px;border-radius:5px;font-family:'DM Mono',monospace;font-size:9px;
  font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;}
.fb.W{background:var(--green);}.fb.D{background:var(--yellow);}.fb.L{background:var(--red);}
.hmid{text-align:center;flex-shrink:0;}
.vslbl{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;color:var(--text3);}

/* SECTIONS */
.sec{padding:14px;border-bottom:1px solid var(--border);background:#fff;margin-bottom:6px;}
.stitle{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--green);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1.5px;background:var(--green3);}

/* SIGNAL CARDS */
.sigc{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.sigc.best{border-color:var(--green);background:var(--green3);}
.btag{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;background:var(--green);
  color:#fff;border-radius:20px;font-family:'Syne',monospace;font-size:9px;font-weight:700;
  letter-spacing:1px;margin-bottom:10px;}
.stop{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.stype{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text3);}
.sbadge{padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;}
.sbadge.g{background:var(--green3);color:var(--green);border:1.5px solid rgba(26,107,58,.2);}
.sbadge.y{background:var(--yellow2);color:var(--yellow);border:1.5px solid rgba(217,119,6,.2);}
.sbadge.r{background:var(--red2);color:var(--red);border:1.5px solid rgba(220,38,38,.2);}
.spick{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px;}
.sreason{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:11px;}
.prow{display:flex;align-items:center;gap:10px;}
.ptrack{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.pfill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.pfg{background:linear-gradient(90deg,#16a34a,var(--green2));}
.pfy{background:linear-gradient(90deg,#b45309,#f59e0b);}
.pfr{background:linear-gradient(90deg,#b91c1c,#ef4444);}
.ppct{font-family:'DM Mono',monospace;font-size:14px;font-weight:600;min-width:44px;text-align:right;}

/* HT/FT */
.htft-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.htfc{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:11px;box-shadow:var(--shadow);}
.htfc.hl12{border-color:var(--orange);background:var(--orange2);}
.htfc.hl21{border-color:var(--purple);background:var(--purple2);}
.htfc.hl11{border-color:var(--green);background:var(--green3);}
.htfc.hl22{border-color:var(--blue);background:var(--blue2);}
.hfcombo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.hfcombo.c12{color:var(--orange);}.hfcombo.c21{color:var(--purple);}
.hfcombo.c11{color:var(--green);}.hfcombo.c22{color:var(--blue);}
.hflbl{font-size:10px;color:var(--text3);margin:3px 0 8px;line-height:1.4;}
.hftag{display:inline-block;font-family:'DM Mono',monospace;font-size:8px;font-weight:700;
  padding:2px 7px;border-radius:8px;margin-bottom:6px;}
.hftag.rev12{background:var(--orange2);color:var(--orange);}
.hftag.rev21{background:var(--purple2);color:var(--purple);}

/* SCORES */
.sc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.sc-item:last-child{border-bottom:none;}
.sc-rank{font-family:'DM Mono',monospace;font-size:11px;width:22px;text-align:center;font-weight:600;}
.sc-v{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;color:var(--text);min-width:50px;}
.sc-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.sc-bf{height:100%;border-radius:3px;}
.sc-pct{font-family:'DM Mono',monospace;font-size:11px;min-width:38px;text-align:right;font-weight:500;}

/* H2H */
.h2t{width:100%;border-collapse:collapse;}
.h2t th{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:6px 7px;
  border-bottom:2px solid var(--border);text-align:left;background:var(--card2);}
.h2t td{padding:9px 7px;font-size:12px;border-bottom:1px solid var(--border);}
.h2t tr:last-child td{border-bottom:none;}

/* STATS */
.s4{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sbox{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px;box-shadow:var(--shadow);}
.slbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--text3);margin-bottom:5px;}
.sv{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.ss{font-size:10px;color:var(--text3);margin-top:2px;}

/* KUPON PAGE */
.kpage{flex:1;overflow-y:auto;background:var(--bg);}
.kpage::-webkit-scrollbar{width:4px;}
.kpage::-webkit-scrollbar-thumb{background:var(--border2);}
.kcont{max-width:680px;margin:0 auto;padding:14px;}
.khdr{text-align:center;padding:18px 0 14px;}
.ktitle{font-family:'Syne',sans-serif;font-size:clamp(16px,4vw,24px);font-weight:800;color:var(--text);margin-bottom:5px;}
.ksub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text3);}
.kcard{background:#fff;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow2);}
.kchdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card2);}
.kctype{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.kctype.t1{color:var(--teal);}.kctype.t2{color:var(--yellow);}
.kctype.t3{color:var(--orange);}.kctype.t4{color:var(--purple);}
.kctype.t5{color:var(--pink);}.kctype.tg{color:var(--green);}
.kcsub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);}
.kcm{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
.kcm:hover{background:var(--card2);}
.kcnum{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text3);min-width:22px;text-align:center;}
.kcteams{flex:1;}
.kcmu{font-size:13px;font-weight:600;color:var(--text);}
.kclg{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);margin-top:2px;}
.kcpick{text-align:center;min-width:80px;}
.kcpv{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;display:inline-block;margin-bottom:3px;}
.kcpv.t1{background:var(--teal2);color:var(--teal);}
.kcpv.t2{background:var(--yellow2);color:var(--yellow);}
.kcpv.t3{background:var(--orange2);color:var(--orange);}
.kcpv.t4{background:var(--purple2);color:var(--purple);}
.kcpv.t5{background:var(--pink2);color:var(--pink);}
.kcpv.tg{background:var(--green3);color:var(--green);}
.kcprob{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);font-weight:600;}
.kcreason{font-size:11px;color:var(--text2);padding:5px 16px 11px 50px;border-bottom:1px solid var(--border);line-height:1.7;background:var(--card2);}
.kcfoot{padding:14px 16px;background:var(--card2);}
.kcfrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.kcfl{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);}
.kcfv{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.cbar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:10px;}
.cbarfill{height:100%;border-radius:4px;transition:width 1.5s cubic-bezier(.4,0,.2,1);}
.disc{padding:12px 14px;margin-top:6px;background:var(--yellow2);border:1.5px solid rgba(217,119,6,.2);border-radius:10px;font-size:11px;color:var(--yellow);line-height:1.8;}
.kld{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:18px;}
.kld.show{display:flex;}
.kld-txt{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-align:center;line-height:2;}

/* GUNUN HERO */
.gunun-hero{background:linear-gradient(135deg,var(--green),#16a34a);padding:20px;margin-bottom:14px;border-radius:14px;color:#fff;box-shadow:0 8px 24px rgba(26,107,58,.3);}
.gunun-hero-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px;}
.gunun-hero-sub{font-size:12px;opacity:.85;font-family:'DM Mono',monospace;}
.gunun-conf{display:flex;align-items:center;gap:16px;margin-top:14px;}
.gunun-conf-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;}
.gunun-conf-lbl{font-size:10px;opacity:.85;font-family:'DM Mono',monospace;}

/* KG DETAY */
.kg-detail{background:var(--pink2);border:1.5px solid rgba(219,39,119,.2);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.kg-detail-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--pink);margin-bottom:8px;}
.kg-detail-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(219,39,119,.1);}
.kg-detail-row:last-child{border-bottom:none;}
.kg-detail-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);}
.kg-detail-val{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--pink);}

/* LIVE */
.live-card{background:#fff;border:2px solid var(--red);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 4px 12px rgba(220,38,38,.12);}
.live-score{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--red);text-align:center;}
.live-signal{border-radius:8px;padding:10px 12px;margin-top:10px;}

/* ERR */
.err-box{margin:14px;padding:14px;background:var(--red2);border:1.5px solid rgba(220,38,38,.2);border-radius:10px;font-size:12px;color:var(--red);line-height:1.8;}

@media(max-width:600px){
  .split{flex-direction:column;}
  .mcol{width:100%;height:44vh;border-right:none;border-bottom:1px solid var(--border);}
  .acol{flex:1;}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">SCOUT <span>PRO</span></div>
    <div class="status"><div class="pdot"></div><span id="statusTxt">BAGLANIYOR</span></div>
  </div>
  <nav class="nav">
    <button class="ntab active" onclick="showPage('scout',this,null)"><span class="ni">🔍</span>ANALIZ</button>
    <button class="ntab tg" onclick="showPage('kg',this,'g')"><span class="ni">🏆</span>GUNUN</button>
    <button class="ntab tlive" onclick="showPage('klive',this,'live')"><span class="ni">🔴</span>CANLI</button>
    <button class="ntab t1" onclick="showPage('k1',this,1)"><span class="ni">⚽</span>2.5UST</button>
    <button class="ntab t2" onclick="showPage('k2',this,2)"><span class="ni">⚡</span>IY1.5</button>
    <button class="ntab t3" onclick="showPage('k3',this,3)"><span class="ni">🔄</span>1/2·2/1</button>
    <button class="ntab t5" onclick="showPage('k5',this,5)"><span class="ni">🎯</span>KG VAR</button>
    <button class="ntab t4" onclick="showPage('k4',this,4)"><span class="ni">🎰</span>SKOR</button>
  </nav>

  <div class="page active" id="page-scout">
    <div class="split">
      <div class="mcol">
        <div class="coltop">
          <div class="ctitle">MACLAR</div>
          <div class="drow" id="drow"></div>
        </div>
        <div class="mlist" id="mlist">
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--text3);">
            <div class="spin"></div>
            <div style="font-family:'DM Mono',monospace;font-size:9px;">YUKLENIYOR...</div>
          </div>
        </div>
      </div>
      <div class="acol" id="acol">
        <div class="es" id="es">
          <div class="ei">⚡</div>
          <div class="et">Mac sec, analiz baslasin</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);line-height:2.2;margin-top:10px;">
            Canli API Verisi ✓<br>Poisson Model ✓<br>H2H Analizi ✓<br>HT/FT 1/2·2/1 ✓<br>KG Var Analizi ✓
          </div>
        </div>
        <div class="ldov" id="ldov"><div class="spin"></div><div class="steplist" id="steplist"></div></div>
        <div id="abody"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-kg"><div class="kpage"><div class="kcont" id="kcg"></div></div></div>
  <div class="page" id="page-klive"><div class="kpage"><div class="kcont" id="kclive"></div></div></div>
  <div class="page" id="page-k1"><div class="kpage"><div class="kcont" id="kc1"></div></div></div>
  <div class="page" id="page-k2"><div class="kpage"><div class="kcont" id="kc2"></div></div></div>
  <div class="page" id="page-k3"><div class="kpage"><div class="kcont" id="kc3"></div></div></div>
  <div class="page" id="page-k4"><div class="kpage"><div class="kcont" id="kc4"></div></div></div>
  <div class="page" id="page-k5"><div class="kpage"><div class="kcont" id="kc5"></div></div></div>
</div>

<script>
'use strict';

const FLAGS={'Premier League':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','La Liga':'🇪🇸','Super Lig':'🇹🇷','Bundesliga':'🇩🇪','Serie A':'🇮🇹','Ligue 1':'🇫🇷','Champions League':'⭐','Europa League':'🔶','Primeira Liga':'🇵🇹','Eredivisie':'🇳🇱','Brasileirao':'🇧🇷','MLS':'🇺🇸','Süper Lig':'🇹🇷'};

let allMatches=[], selId=null, statsCache={}, currentDate=new Date().toISOString().split('T')[0];

// ═══ POISSON ═══
function poi(l,k){let r=Math.exp(-l);for(let i=1;i<=k;i++)r*=l/i;return r;}

function calcPoisson(hs,as_){
  const leagAvg=1.45;
  const lH=Math.max((hs.avgFor||1.35)*((as_.avgAgainst||1.3)/leagAvg),0.3);
  const lA=Math.max((as_.avgFor||1.1)*((hs.avgAgainst||1.3)/leagAvg),0.2);

  const ft={}, ht={};
  for(let h=0;h<=6;h++)for(let a=0;a<=6;a++)ft[`${h}-${a}`]=poi(lH,h)*poi(lA,a);
  for(let h=0;h<=3;h++)for(let a=0;a<=3;a++)ht[`${h}-${a}`]=poi(lH*.44,h)*poi(lA*.44,a);

  let hw=0,dr=0,aw=0,ov25=0,btts=0,iy15=0;
  Object.entries(ft).forEach(([sc,p])=>{
    const[h,a]=sc.split('-').map(Number);
    if(h>a)hw+=p;else if(h===a)dr+=p;else aw+=p;
    if(h+a>2.5)ov25+=p;
    if(h>0&&a>0)btts+=p;
  });
  Object.entries(ht).forEach(([sc,p])=>{
    const[h,a]=sc.split('-').map(Number);
    if(h+a>=2)iy15+=p;
  });

  // BTTS detailed
  const homeScoreProb = 1 - poi(lH,0);
  const awayScoreProb = 1 - poi(lA,0);
  const bttsAdj = homeScoreProb * awayScoreProb * 100;

  // HT/FT matrix
  const htft={};
  ['1','X','2'].forEach(h=>['1','X','2'].forEach(f=>htft[`${h}/${f}`]=0));
  Object.entries(ft).forEach(([ftsc,fp])=>{
    const[fh,fa]=ftsc.split('-').map(Number);
    const ftR=fh>fa?'1':fh===fa?'X':'2';
    Object.entries(ht).forEach(([htsc,hp])=>{
      const[hh,ha]=htsc.split('-').map(Number);
      htft[`${hh>ha?'1':hh===ha?'X':'2'}/${ftR}`]+=fp*hp;
    });
  });
  const tot=Object.values(htft).reduce((a,b)=>a+b,0);
  const htftN={};
  Object.entries(htft).forEach(([k,v])=>htftN[k]=+(v/tot*100).toFixed(2));

  const ftS=Object.entries(ft).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([s,p])=>({score:s,prob:+(p*100).toFixed(1)}));
  const htS=Object.entries(ht).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([s,p])=>({score:s,prob:+(p*100).toFixed(1)}));

  return{
    lH:+lH.toFixed(3),lA:+lA.toFixed(3),
    hw:+(hw*100).toFixed(1),dr:+(dr*100).toFixed(1),aw:+(aw*100).toFixed(1),
    ov25:+(ov25*100).toFixed(1),iy15:+(iy15*100).toFixed(1),
    btts:+(btts*100).toFixed(1),bttsAdj:+bttsAdj.toFixed(1),
    homeScore:+(homeScoreProb*100).toFixed(1),awayScore:+(awayScoreProb*100).toFixed(1),
    htftN,ftScores:ftS,htScores:htS,
  };
}

// ═══ NAV ═══
function showPage(id,btn,knum){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  if(knum==='g') buildGunun();
  else if(knum==='live') buildLive();
  else if(knum) buildKupon(knum);
}

// ═══ DATE BAR ═══
function buildDates(){
  const bar=document.getElementById('drow'),today=new Date();
  const DAYS=['Paz','Pzt','Sal','Car','Per','Cum','Cmt'];
  const MONS=['Oca','Sub','Mar','Nis','May','Haz','Tem','Agu','Eyl','Eki','Kas','Ara'];
  for(let i=-1;i<=5;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const ch=document.createElement('button');ch.className='dchip'+(i===0?' active':'');
    const lbl=i===-1?'Dun':i===0?'Bugun':i===1?'Yarin':DAYS[d.getDay()];
    ch.innerHTML=`<div style="font-size:8px;margin-bottom:1px;">${lbl}</div>${d.getDate()} ${MONS[d.getMonth()]}`;
    ch.dataset.date=d.toISOString().split('T')[0];
    ch.onclick=()=>{
      document.querySelectorAll('.dchip').forEach(c=>c.classList.remove('active'));
      ch.classList.add('active');
      currentDate=ch.dataset.date;
      loadFixtures(ch.dataset.date);
    };
    bar.appendChild(ch);
  }
}

// ═══ LOAD FIXTURES ═══
async function loadFixtures(date){
  const list=document.getElementById('mlist');
  list.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--text3);"><div class="spin"></div><div style="font-family:'DM Mono',monospace;font-size:9px;">API DEN VERI ALINIYOR...</div></div>`;
  try{
    const res=await fetch(`/api/fixtures?date=${date}`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    allMatches=data.matches||[];
    const live=allMatches.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED').length;
    setStatus(true,`${allMatches.length} MAC${live>0?' · '+live+' CANLI':''}`);
    renderMatchList();
  }catch(err){
    setStatus(false,'HATA');
    list.innerHTML=`<div class="err-box">API Hatasi: ${err.message}<br><br>football-data.org API key'ini Vercel Environment Variables'a ekleyip Redeploy yap.</div>`;
  }
}

function setStatus(ok,txt){
  document.getElementById('statusTxt').textContent=txt;
  document.querySelector('.pdot').style.background=ok?'#22c55e':'#f59e0b';
}

// ═══ RENDER MATCH LIST ═══
function renderMatchList(){
  const list=document.getElementById('mlist');
  if(!allMatches.length){
    list.innerHTML=`<div style="padding:30px;text-align:center;color:var(--text3);font-size:11px;">Bu tarihte mac bulunamadi.</div>`;
    return;
  }
  // Hide finished matches
  const visible=allMatches.filter(m=>m.status!=='FINISHED');
  const finished=allMatches.length-visible.length;
  const live=visible.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED').length;
  const grp={};
  visible.forEach(m=>{if(!grp[m.league])grp[m.league]=[];grp[m.league].push(m);});

  let h=`<div class="mmatch-count">${live>0?'<span style="color:var(--red);font-weight:700;">🔴 '+live+' CANLI</span> · ':''} ${visible.length} mac kaldi${finished>0?' · '+finished+' bitti':''}</div>`;
  if(!visible.length){
    h+=`<div style="padding:20px;text-align:center;color:var(--text3);font-size:11px;">Bugunun tum maclari bitti.</div>`;
  }
  Object.entries(grp).forEach(([lg,ms])=>{
    h+=`<div class="lghdr">${FLAGS[lg]||'🌍'} ${lg} <span style="margin-left:auto;background:var(--border);padding:1px 6px;border-radius:10px;">${ms.length}</span></div>`;
    ms.forEach(m=>{
      const isLive=m.status==='IN_PLAY'||m.status==='PAUSED';
      h+=`<div class="mitem${m.id===selId?' active':''}${isLive?' live-item':''}" id="mi-${m.id}" onclick="selMatch('${m.id}')">
        <div class="mt">${m.time}${isLive?'<span class="live-badge">CANLI</span>':''}</div>
        <div class="mh">${m.home}</div>
        <div class="ma">${m.away}</div>
      </div>`;
    });
  });
  list.innerHTML=h;
}

// ═══ SELECT MATCH ═══
const STEPS=['Mac bilgileri aliniyor...','Takim form analizi...','H2H gecmis skorlar...','Poisson lambda hesaplaniyor...','HT/FT matrisi kuruluyor...','KG Var analizi yapiliyor...','Skor tahminleri siralaniyor...','Guven skoru hesaplaniyor...'];

async function selMatch(id){
  document.querySelectorAll('.mitem').forEach(r=>r.classList.remove('active'));
  document.getElementById('mi-'+id)?.classList.add('active');
  const m=allMatches.find(x=>x.id===id);if(!m)return;
  selId=id;
  document.getElementById('es').style.display='none';
  document.getElementById('abody').innerHTML='';
  const ld=document.getElementById('ldov');ld.classList.add('show');
  document.getElementById('steplist').innerHTML=STEPS.map((s,i)=>`<div class="si" id="si${i}"><div class="sdot"></div>${s}</div>`).join('');
  STEPS.forEach((_,i)=>{
    setTimeout(()=>document.getElementById('si'+i)?.classList.add('act'),i*220);
    setTimeout(()=>{const el=document.getElementById('si'+i);if(el){el.classList.remove('act');el.classList.add('done');}},i*220+200);
  });
  let sd=null;
  if(m.homeId&&m.awayId){
    try{const r=await fetch(`/api/teamstats?homeId=${m.homeId}&awayId=${m.awayId}&matchId=${m.id}`);if(r.ok)sd=await r.json();}
    catch(e){}
  }
  const hs=sd?.home||{avgFor:1.35,avgAgainst:1.3,form:['W','D','W','L','W'],htAvgFor:0.6,htAvgAgainst:0.55,over25Rate:50,bttsRate:48};
  const as_=sd?.away||{avgFor:1.1,avgAgainst:1.35,form:['D','W','L','W','D'],htAvgFor:0.5,htAvgAgainst:0.58,over25Rate:44,bttsRate:44};
  const h2h=sd?.h2h||[];
  statsCache[m.id]={home:hs,away:as_};
  const p=calcPoisson(hs,as_);
  setTimeout(()=>{ld.classList.remove('show');renderAnalysis(m,p,hs,as_,h2h);},STEPS.length*220+300);
}

// ═══ RENDER ANALYSIS ═══
function renderAnalysis(m,p,hs,as_,h2h){
  const ab=document.getElementById('abody');
  const fb=f=>(f||[]).map(x=>`<div class="fb ${x}">${x}</div>`).join('');

  // KG Var detailed analysis
  const kgScore = (p.bttsAdj*0.5 + p.btts*0.3 + (hs.bttsRate||50)*0.1 + (as_.bttsRate||50)*0.1);
  const kgConf = Math.min(Math.max(kgScore,10),90);
  const homeWillScore = p.homeScore;
  const awayWillScore = p.awayScore;

  const sigs=[
    {type:'MAC SONU',pick:p.hw>p.aw?`1 — ${m.home}`:p.aw>p.hw?`2 — ${m.away}`:'X — Beraberlik',
     conf:Math.max(p.hw,p.aw,p.dr),
     reason:`Ev %${p.hw} | Beraberlik %${p.dr} | Deplasman %${p.aw} | Lambda: ${p.lH}/${p.lA}`,
     lvl:Math.max(p.hw,p.aw,p.dr)>=60?'g':'y'},
    {type:'TOPLAM GOL (2.5)',pick:p.ov25>50?'Ust 2.5':'Alt 2.5',
     conf:p.ov25,
     reason:`Poisson: %${p.ov25} | Toplam lambda: ${(p.lH+p.lA).toFixed(2)} | Ev ort: ${hs.avgFor} | Dep ort: ${as_.avgFor}`,
     lvl:p.ov25>=60?'g':p.ov25>=45?'y':'r'},
    {type:'IY 1.5 UST',pick:'IY Ust 1.5',
     conf:p.iy15,
     reason:`IY Poisson: %${p.iy15} | IY lambda: ${(p.lH*.44).toFixed(2)}+${(p.lA*.44).toFixed(2)}`,
     lvl:p.iy15>=40?'g':p.iy15>=28?'y':'r'},
    {type:'KARSILIKLI GOL',pick:'KG Var',
     conf:+kgConf.toFixed(1),
     reason:`Ev gol atar: %${homeWillScore} | Dep gol atar: %${awayWillScore} | Birlesik KG: %${p.bttsAdj} | Form istatistigi: Ev BTTS %${hs.bttsRate||'?'} | Dep BTTS %${as_.bttsRate||'?'}`,
     lvl:kgConf>=60?'g':kgConf>=48?'y':'r'},
  ];
  const bestIdx=sigs.reduce((bi,sg,i)=>sg.conf>sigs[bi].conf?i:bi,0);

  const sigHtml=sigs.map((sg,i)=>`
    <div class="sigc${i===bestIdx?' best':''}">
      ${i===bestIdx?'<div class="btag">🟢 EN GUCLU SINYAL</div>':''}
      <div class="stop"><div class="stype">${sg.type}</div>
      <div class="sbadge ${sg.lvl}">${sg.conf>=65?'✅ GUCLU':sg.conf>=50?'⚡ ORTA':'⚠ ZAYIF'}</div></div>
      <div class="spick">${sg.pick}</div>
      <div class="sreason">${sg.reason}</div>
      <div class="prow"><div class="ptrack"><div class="pfill pf${sg.lvl}" style="width:0%" data-w="${Math.min(Math.round(sg.conf),94)}%"></div></div>
      <div class="ppct" style="color:${sg.lvl==='g'?'var(--green)':sg.lvl==='y'?'var(--yellow)':'var(--red)'}">${Math.round(sg.conf)}%</div></div>
    </div>`).join('');

  // HT/FT
  const htftOrder=['1/2','2/1','1/1','2/2','X/1','X/2'];
  const cMap={'1/2':'c12','2/1':'c21','1/1':'c11','2/2':'c22'};
  const hlMap={'1/2':'hl12','2/1':'hl21','1/1':'hl11','2/2':'hl22'};
  const maxHF=Math.max(...htftOrder.map(c=>p.htftN[c]||0));
  const htftHtml=htftOrder.map(c=>{
    const prob=p.htftN[c]||0,clr=cMap[c]||'',hl=hlMap[c]||'';
    const isRev=c==='1/2'||c==='2/1';
    return `<div class="htfc ${hl}">
      ${isRev?`<div class="hftag ${c==='1/2'?'rev12':'rev21'}">★ DONUS ${c}</div>`:''}
      <div class="hfcombo ${clr}">${c}</div>
      <div class="hflbl">${htftLbl(c,m.home,m.away)}</div>
      <div class="prow"><div class="ptrack"><div class="pfill pf${c==='1/2'?'r':c==='2/1'?'g':'y'}" style="width:0%" data-w="${Math.round(prob*100/Math.max(maxHF,.01))}%"></div></div>
      <div class="ppct" style="font-size:11px;">%${prob}</div></div>
    </div>`;
  }).join('');

  // Scores
  const mxFT=p.ftScores[0]?.prob||1;
  const ftHtml=p.ftScores.slice(0,5).map((sc,i)=>`
    <div class="sc-item">
      <div class="sc-rank" style="color:${['#d97706','#6b7280','#b45309','var(--muted)','var(--muted)'][i]}">${['①','②','③','④','⑤'][i]}</div>
      <div class="sc-v">${sc.score}</div>
      <div class="sc-bar"><div class="sc-bf" style="background:linear-gradient(90deg,#16a34a,#22c55e);width:0%" data-w="${Math.round(sc.prob*100/mxFT)}%"></div></div>
      <div class="sc-pct" style="color:var(--green)">%${sc.prob}</div>
    </div>`).join('');

  const mxHT=p.htScores[0]?.prob||1;
  const htHtml=p.htScores.slice(0,4).map((sc,i)=>`
    <div class="sc-item">
      <div class="sc-rank" style="color:${['#d97706','#6b7280','#b45309','var(--muted)'][i]}">${['①','②','③','④'][i]}</div>
      <div class="sc-v">${sc.score}</div>
      <div class="sc-bar"><div class="sc-bf" style="background:linear-gradient(90deg,#b45309,#f59e0b);width:0%" data-w="${Math.round(sc.prob*100/mxHT)}%"></div></div>
      <div class="sc-pct" style="color:var(--yellow)">%${sc.prob}</div>
    </div>`).join('');

  // H2H
  const h2hHtml=h2h.length?h2h.map(h=>{
    const col=h.winner==='HOME_TEAM'?'var(--green)':h.winner==='AWAY_TEAM'?'var(--red)':'var(--yellow)';
    return `<tr><td style="color:var(--text3);font-family:'DM Mono',monospace;font-size:9px;">${h.date}</td>
      <td style="font-weight:600;font-size:12px;">${h.home}</td>
      <td style="font-family:'DM Mono',monospace;font-weight:700;color:${col};text-align:center;">${h.score}</td>
      <td style="font-size:12px;">${h.away}</td>
      <td style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-align:center;">${h.ht}</td></tr>`;
  }).join(''):`<tr><td colspan="5" style="text-align:center;color:var(--text3);font-size:11px;padding:16px;">H2H verisi bulunamadi</td></tr>`;

  // KG detailed section
  const kgBttsH2h = h2h.filter(h=>h.score&&h.score!=='?-?').filter(h=>{
    const[a,b]=h.score.split('-').map(Number);return a>0&&b>0;
  }).length;
  const h2hTotal=h2h.filter(h=>h.score&&h.score!=='?-?').length;

  ab.innerHTML=`
    <div class="mhero">
      <div class="hmeta">
        <span>${FLAGS[m.league]||'🌍'} ${m.league}</span>
        ${m.matchday?`<span class="hmeta-tag">Hafta ${m.matchday}</span>`:''}
        <span class="hmeta-tag">⏰ ${m.time}</span>
      </div>
      <div class="hvs">
        <div class="hteam"><div class="hname">${m.home}</div><div class="frow">${fb(hs.form)}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace;">${hs.wins||0}G ${hs.draws||0}B ${hs.losses||0}M</div></div>
        <div class="hmid"><div class="vslbl">VS</div></div>
        <div class="hteam"><div class="hname">${m.away}</div><div class="frow">${fb(as_.form)}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace;">${as_.wins||0}G ${as_.draws||0}B ${as_.losses||0}M</div></div>
      </div>
    </div>

    <div class="sec"><div class="stitle">Bahis Sinyalleri</div>${sigHtml}</div>

    <div class="sec">
      <div class="stitle">KG VAR — Detayli Analiz</div>
      <div class="kg-detail">
        <div class="kg-detail-title">Karsilikli Gol Gostergeleri</div>
        <div class="kg-detail-row"><div class="kg-detail-lbl">${m.home} gol atar</div><div class="kg-detail-val">%${homeWillScore}</div></div>
        <div class="kg-detail-row"><div class="kg-detail-lbl">${m.away} gol atar</div><div class="kg-detail-val">%${awayWillScore}</div></div>
        <div class="kg-detail-row"><div class="kg-detail-lbl">Poisson KG</div><div class="kg-detail-val">%${p.btts}</div></div>
        <div class="kg-detail-row"><div class="kg-detail-lbl">Matematiksel KG</div><div class="kg-detail-val">%${p.bttsAdj}</div></div>
        <div class="kg-detail-row"><div class="kg-detail-lbl">H2H KG Var (son ${h2hTotal} mac)</div><div class="kg-detail-val">${kgBttsH2h}/${h2hTotal} mac</div></div>
        <div class="kg-detail-row"><div class="kg-detail-lbl">Ev BTTS orani</div><div class="kg-detail-val">%${hs.bttsRate||'?'}</div></div>
        <div class="kg-detail-row"><div class="kg-detail-lbl">Dep BTTS orani</div><div class="kg-detail-val">%${as_.bttsRate||'?'}</div></div>
        <div class="kg-detail-row" style="border-top:2px solid rgba(219,39,119,.2);margin-top:4px;padding-top:8px;">
          <div class="kg-detail-lbl" style="font-weight:700;color:var(--pink);">GENEL KG VAR GUVEN</div>
          <div class="kg-detail-val" style="font-size:16px;">${Math.round(kgConf)}%</div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="stitle">HT/FT — 1/2 · 2/1</div>
      <div style="background:var(--orange2);border:1.5px solid rgba(234,88,12,.2);border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:12px;color:var(--orange);line-height:1.7;">
        🔄 1/2 = IY ${m.home} onde, MS ${m.away} kazanir<br>
        🔄 2/1 = IY ${m.away} onde, MS ${m.home} kazanir
      </div>
      <div class="htft-grid">${htftHtml}</div>
    </div>

    <div class="sec"><div class="stitle">Mac Sonu Skor Tahminleri</div>${ftHtml}</div>
    <div class="sec"><div class="stitle">Ilk Yari Skor Tahminleri</div>${htHtml}</div>

    <div class="sec">
      <div class="stitle">Poisson Model</div>
      <div class="s4">
        <div class="sbox"><div class="slbl">Ev Lambda</div><div class="sv" style="color:var(--green)">${p.lH}</div><div class="ss">${m.home}</div></div>
        <div class="sbox"><div class="slbl">Dep Lambda</div><div class="sv" style="color:var(--blue)">${p.lA}</div><div class="ss">${m.away}</div></div>
        <div class="sbox"><div class="slbl">Toplam</div><div class="sv" style="color:var(--yellow)">${(p.lH+p.lA).toFixed(2)}</div><div class="ss">Beklenen gol</div></div>
        <div class="sbox"><div class="slbl">Ust 2.5</div><div class="sv" style="color:var(--orange)">${p.ov25}%</div><div class="ss">Olasilik</div></div>
      </div>
    </div>

    <div class="sec">
      <div class="stitle">H2H Gecmis Maclar</div>
      <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--border);">
        <table class="h2t">
          <thead><tr><th>Tarih</th><th>Ev</th><th style="text-align:center">Skor</th><th>Dep</th><th style="text-align:center">IY</th></tr></thead>
          <tbody>${h2hHtml}</tbody>
        </table>
      </div>
    </div>
    <div style="height:20px;"></div>`;

  setTimeout(()=>{ab.querySelectorAll('[data-w]').forEach(el=>{el.style.width=el.dataset.w;});},120);
}

function htftLbl(c,h,a){const m={'1':h,'X':'Beraberlik','2':a};const[ht,ft]=c.split('/');return `IY: ${m[ht]} MS: ${m[ft]}`;}

// ═══ KUPON ENGINE ═══
function getDefaultStats(){
  return {
    home:{avgFor:1.35,avgAgainst:1.3,htAvgFor:0.58,htAvgAgainst:0.55,over25Rate:50,bttsRate:46,wins:5,draws:3,losses:2},
    away:{avgFor:1.1,avgAgainst:1.35,htAvgFor:0.5,htAvgAgainst:0.58,over25Rate:44,bttsRate:44,wins:4,draws:3,losses:3}
  };
}

function analyzeAll(){
  return allMatches.map(m=>{
    const s=statsCache[m.id]||getDefaultStats();
    const p=calcPoisson(s.home,s.away);
    const kgConf=Math.min(Math.max(p.bttsAdj*0.5+p.btts*0.3+(s.home.bttsRate||50)*0.1+(s.away.bttsRate||50)*0.1,10),90);
    return{match:m,p,hs:s.home,as_:s.away,kgConf:+kgConf.toFixed(1)};
  });
}

const KUPON_CFG={
  1:{icon:'⚽',title:'2.5 UST KUPONU',color:'var(--teal)',type:'t1',
     sub:'Gol beklentisi en yuksek maclar',
     pickFn:(m,p,hs,as_,kg)=>({pick:'Ust 2.5',prob:p.ov25,
       reason:`Poisson: %${p.ov25} | Lambda: ${(p.lH+p.lA).toFixed(2)} | Ev ort: ${hs.avgFor} gol | Dep ort: ${as_.avgFor} gol`}),
     sortFn:(a,b)=>b.p.ov25-a.p.ov25},
  2:{icon:'⚡',title:'IY 1.5 UST KUPONU',color:'var(--yellow)',type:'t2',
     sub:'Ilk yaridaki gol beklentisi en yuksek maclar',
     pickFn:(m,p,hs,as_,kg)=>({pick:'IY Ust 1.5',prob:p.iy15,
       reason:`IY Poisson: %${p.iy15} | IY Lambda: ${(p.lH*.44+p.lA*.44).toFixed(2)} | Ev IY ort: ${hs.htAvgFor||'?'} | Dep IY ort: ${as_.htAvgFor||'?'}`}),
     sortFn:(a,b)=>b.p.iy15-a.p.iy15},
  3:{icon:'🔄',title:'1/2 · 2/1 KUPONU',color:'var(--orange)',type:'t3',
     sub:'Tersine donus kombinasyonu — yuksek oran',
     pickFn:(m,p,hs,as_,kg)=>{
       const p12=p.htftN['1/2']||0,p21=p.htftN['2/1']||0;
       const best=p12>p21?'1/2':'2/1',bP=Math.max(p12,p21);
       return{pick:best,prob:Math.min(bP*4,70),reason:`1/2: %${p12} | 2/1: %${p21} | Secilen: ${best} | Lambda fark: ${Math.abs(p.lH-p.lA).toFixed(2)}`};
     },
     sortFn:(a,b)=>((b.p.htftN['1/2']||0)+(b.p.htftN['2/1']||0))-((a.p.htftN['1/2']||0)+(a.p.htftN['2/1']||0))},
  4:{icon:'🎰',title:'SKOR KUPONU',color:'var(--purple)',type:'t4',
     sub:'Kesin skor tahmini',
     pickFn:(m,p,hs,as_,kg)=>{const b=p.ftScores[0];return{pick:b?.score||'1-0',prob:Math.min((b?.prob||8)*2,55),reason:`En olasi: ${b?.score} (%${b?.prob}) | Lambda: ${p.lH}/${p.lA}`};},
     sortFn:(a,b)=>(b.p.ftScores[0]?.prob||0)-(a.p.ftScores[0]?.prob||0)},
  5:{icon:'🎯',title:'KG VAR KUPONU',color:'var(--pink)',type:'t5',
     sub:'Karsilikli gol — detayli istatistik analizi ile secilmis maclar',
     pickFn:(m,p,hs,as_,kg)=>({pick:'KG Var',prob:kg,
       reason:`Ev gol atar: %${p.homeScore} | Dep gol atar: %${p.awayScore} | Poisson KG: %${p.btts} | Matematiksel KG: %${p.bttsAdj} | Ev BTTS %${hs.bttsRate||'?'} | Dep BTTS %${as_.bttsRate||'?'}`}),
     sortFn:(a,b)=>b.kgConf-a.kgConf},
};

async function buildKupon(num){
  const cfg=KUPON_CFG[num];
  const cont=document.getElementById('kc'+num);
  cont.innerHTML=`
    <div class="khdr"><div class="ktitle">${cfg.icon} ${cfg.title}</div><div class="ksub">${cfg.sub}</div></div>
    <div class="kld show" id="kld${num}">
      <div class="spin" style="border-top-color:${cfg.color}"></div>
      <div class="kld-txt">Tum maclar analiz ediliyor...<br>Istatistiksel filtreler uygulanıyor...<br>En guclu sinyaller seciliyor...</div>
    </div>
    <div id="kr${num}"></div>`;
  await ensureMatches();
  const all=analyzeAll();
  const sorted=all.sort(cfg.sortFn).slice(0,4);
  document.getElementById('kld'+num)?.classList.remove('show');
  renderKupon(num,cfg,cont,sorted);
}

function renderKupon(num,cfg,cont,data){
  const kr=document.getElementById('kr'+num);
  if(!data||!data.length){
    kr.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3);font-size:11px;">Yeterli mac bulunamadi.</div>`;
    return;
  }
  const picks=data.map(x=>cfg.pickFn(x.match,x.p,x.hs,x.as_,x.kgConf));
  const combProb=picks.reduce((acc,p)=>acc*(p.prob/100),1)*100;
  const avgProb=picks.reduce((a,p)=>a+p.prob,0)/picks.length;
  const rows=data.map((x,i)=>`
    <div class="kcm">
      <div class="kcnum">${i+1}</div>
      <div class="kcteams">
        <div class="kcmu">${x.match.home} — ${x.match.away}</div>
        <div class="kclg">${FLAGS[x.match.league]||''} ${x.match.league} · ${x.match.time}</div>
      </div>
      <div class="kcpick">
        <div class="kcpv ${cfg.type}">${picks[i].pick}</div>
        <div class="kcprob">%${Math.round(picks[i].prob)}</div>
      </div>
    </div>
    <div class="kcreason">${picks[i].reason}</div>`).join('');
  const fillW=Math.min(Math.round(combProb),94);
  const fillBg=fillW>=50?'linear-gradient(90deg,#16a34a,#22c55e)':fillW>=30?'linear-gradient(90deg,#b45309,#f59e0b)':'linear-gradient(90deg,#b91c1c,#ef4444)';
  kr.innerHTML=`
    <div class="kcard">
      <div class="kchdr"><div class="kctype ${cfg.type}">${cfg.icon} ${cfg.title}</div><div class="kcsub">${data.length} mac secildi</div></div>
      ${rows}
      <div class="kcfoot">
        <div class="kcfrow"><div class="kcfl">Tutma Ihtimali</div><div class="kcfv" style="color:${cfg.color}">${combProb.toFixed(1)}%</div></div>
        <div class="kcfrow"><div class="kcfl">Ortalama</div><div class="kcfv" style="color:var(--text3);font-size:14px;">${avgProb.toFixed(1)}%</div></div>
        <div class="cbar"><div class="cbarfill" id="cbf${num}" style="width:0%;background:${fillBg}"></div></div>
      </div>
    </div>
    <div class="disc">⚠ Poisson dagılımı · Form istatistikleri · H2H analizi · Matematiksel olasilik hesabi. Kesin sonuc garantisi vermez.</div>`;
  setTimeout(()=>{const el=document.getElementById('cbf'+num);if(el)el.style.width=fillW+'%';},200);
}

// ═══ GUNUN KUPONU ═══
async function buildGunun(){
  const cont=document.getElementById('kcg');
  cont.innerHTML=`
    <div class="khdr"><div class="ktitle">🏆 Gunun Kuponu</div><div class="ksub">Tum bahis turlerinden en guclu secimler</div></div>
    <div class="kld show" id="kldg">
      <div class="spin" style="border-top-color:var(--green)"></div>
      <div class="kld-txt">Tum maclar taranıyor...<br>Her bahis turu analiz ediliyor...<br>En yuksek guven skorlari seciliyor...</div>
    </div>
    <div id="krg"></div>`;
  await ensureMatches();
  const all=analyzeAll();
  const candidates=[];
  all.forEach(x=>{
    const bets=[
      {type:'Ust 2.5',conf:x.p.ov25,reason:`Lambda: ${(x.p.lH+x.p.lA).toFixed(2)} | Poisson: %${x.p.ov25}`},
      {type:'KG Var',conf:x.kgConf,reason:`Ev gol atar: %${x.p.homeScore} | Dep gol atar: %${x.p.awayScore} | KG: %${x.kgConf}`},
      {type:x.p.hw>x.p.aw?`MS 1`:x.p.aw>x.p.hw?`MS 2`:'MS X',
       conf:Math.max(x.p.hw,x.p.aw,x.p.dr),
       reason:`Ev %${x.p.hw} | Bera %${x.p.dr} | Dep %${x.p.aw}`},
    ];
    const best=bets.reduce((a,b)=>b.conf>a.conf?b:a);
    candidates.push({match:x.match,bet:best,p:x.p});
  });
  candidates.sort((a,b)=>b.bet.conf-a.bet.conf);
  const top=candidates.slice(0,4);
  document.getElementById('kldg')?.classList.remove('show');

  if(!top.length){
    document.getElementById('krg').innerHTML=`<div style="text-align:center;padding:40px;color:var(--text3);font-size:11px;">Bugün icin yeterli mac yok.</div>`;
    return;
  }

  const avgConf=top.reduce((a,x)=>a+x.bet.conf,0)/top.length;
  const combProb=top.reduce((acc,x)=>acc*(x.bet.conf/100),1)*100;
  const rows=top.map((x,i)=>`
    <div class="kcm">
      <div class="kcnum" style="color:var(--green);font-size:16px;">${['🥇','🥈','🥉','4️⃣'][i]}</div>
      <div class="kcteams">
        <div class="kcmu">${x.match.home} — ${x.match.away}</div>
        <div class="kclg">${FLAGS[x.match.league]||''} ${x.match.league} · ${x.match.time}</div>
      </div>
      <div class="kcpick">
        <div class="kcpv tg">${x.bet.type}</div>
        <div class="kcprob" style="color:var(--green);font-weight:700;">%${Math.round(x.bet.conf)}</div>
      </div>
    </div>
    <div class="kcreason">${x.bet.reason}</div>`).join('');
  const fillW=Math.min(Math.round(combProb),94);
  document.getElementById('krg').innerHTML=`
    <div class="gunun-hero">
      <div class="gunun-hero-title">🏆 Gunun En Iyi Kuponu</div>
      <div class="gunun-hero-sub">${new Date(currentDate).toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'})}</div>
      <div class="gunun-conf">
        <div><div class="gunun-conf-val">${combProb.toFixed(1)}%</div><div class="gunun-conf-lbl">Kombine tutma</div></div>
        <div style="opacity:.5;">|</div>
        <div><div class="gunun-conf-val">${avgConf.toFixed(0)}%</div><div class="gunun-conf-lbl">Ort guven skoru</div></div>
      </div>
    </div>
    <div class="kcard">
      <div class="kchdr"><div class="kctype tg">🏆 GUNUN TERCIHLERI</div><div class="kcsub">${top.length} Secim</div></div>
      ${rows}
      <div class="kcfoot">
        <div class="kcfrow"><div class="kcfl">Kombine Tutma</div><div class="kcfv" style="color:var(--green)">${combProb.toFixed(1)}%</div></div>
        <div class="cbar"><div class="cbarfill" id="cbfg" style="width:0%;background:linear-gradient(90deg,#16a34a,#22c55e)"></div></div>
      </div>
    </div>
    <div class="disc">⚠ Tum maclar Poisson modeli, form ve KG analiziyle degerlendirildi. Kesin sonuc garantisi vermez.</div>`;
  setTimeout(()=>{const el=document.getElementById('cbfg');if(el)el.style.width=fillW+'%';},200);
}

// ═══ CANLI MAC ═══
async function buildLive(){
  const cont=document.getElementById('kclive');
  await ensureMatches();
  const live=allMatches.filter(m=>m.status==='IN_PLAY'||m.status==='PAUSED');
  if(!live.length){
    cont.innerHTML=`
      <div class="khdr"><div class="ktitle" style="color:var(--red);">🔴 Canli Maclar</div><div class="ksub">Su an oynanan maclar</div></div>
      <div style="text-align:center;padding:60px 20px;color:var(--text3);">
        <div style="font-size:48px;margin-bottom:16px;">⏰</div>
        <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px;">Su an canli mac yok</div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;">Mac basladiginda burada gorunur</div>
      </div>`;
    return;
  }
  const rows=live.map(m=>{
    const s=statsCache[m.id]||getDefaultStats();
    const p=calcPoisson(s.home,s.away);
    const ft=m.score?.fullTime;
    const ht=m.score?.halfTime;
    const score=ft?`${ft.home} - ${ft.away}`:'0 - 0';
    const htStr=ht?`IY: ${ht.home}-${ht.away}`:'';
    const totalGoals=(ft?.home||0)+(ft?.away||0);
    let signal,signalColor,urgency;
    if(totalGoals===0&&p.ov25>55){
      signal=`🚨 UST 2.5 OYNA — Hic gol yok ama her iki takim guc dengesi var. Lambda: ${(p.lH+p.lA).toFixed(2)}. Poisson %${p.ov25} ust 2.5 destekliyor.`;
      urgency='ACIL OYNA';signalColor='var(--red)';
    }else if(totalGoals===1&&p.ov25>58){
      signal=`⚡ UST 2.5 — 1 gol var, istatistik 2 gol daha destekliyor. Lambda: ${(p.lH+p.lA).toFixed(2)}`;
      urgency='OYNA';signalColor='var(--orange)';
    }else if(p.hw>65){
      signal=`✅ MS 1 (${m.home}) — Guclu ev favorisi. Ev lambda: ${p.lH} | Kazanma: %${p.hw}`;
      urgency='TAVSiYE';signalColor='var(--green)';
    }else if(p.aw>65){
      signal=`✅ MS 2 (${m.away}) — Guclu deplasman. Dep lambda: ${p.lA} | Kazanma: %${p.aw}`;
      urgency='TAVSiYE';signalColor='var(--green)';
    }else if(p.bttsAdj>65){
      signal=`🎯 KG VAR — Her iki takim da gol atacak. Ev gol: %${p.homeScore} | Dep gol: %${p.awayScore}`;
      urgency='OYNA';signalColor='var(--pink)';
    }else{
      signal=`📊 BEKLE — Lambda: ${p.lH}/${p.lA} | Ust 2.5: %${p.ov25} | Yeterli sinyal yok`;
      urgency='iZLE';signalColor='var(--blue)';
    }
    return `<div class="live-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);">${FLAGS[m.league]||'🌍'} ${m.league}</div>
        <div style="background:${signalColor};color:#fff;font-family:'Syne',sans-serif;font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;">${urgency}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;flex:1;">${m.home}</div>
        <div style="text-align:center;padding:0 8px;">
          <div class="live-score">${score}</div>
          ${htStr?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);">${htStr}</div>`:''}
          <div style="background:var(--red);color:#fff;font-size:7px;font-weight:700;padding:2px 6px;border-radius:3px;margin-top:3px;">🔴 CANLI</div>
        </div>
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;flex:1;text-align:right;">${m.away}</div>
      </div>
      <div class="live-signal" style="background:${signalColor}15;border:1.5px solid ${signalColor}40;">
        <div style="font-size:12px;font-weight:600;color:${signalColor};margin-bottom:5px;">${signal}</div>
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);">Ev %${p.hw} | Bera %${p.dr} | Dep %${p.aw} | Ust 2.5: %${p.ov25} | KG: %${Math.round(p.bttsAdj)}</div>
      </div>
    </div>`;
  }).join('');
  cont.innerHTML=`
    <div class="khdr">
      <div class="ktitle" style="color:var(--red);">🔴 Canli Sinyal</div>
      <div class="ksub">${live.length} mac su an oynaniyor · Sayfayi yenileyerek guncelle</div>
    </div>
    <div style="background:var(--red2);border:1.5px solid rgba(220,38,38,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:var(--red);line-height:1.7;">
      ⚠ Canli sinyaller Poisson modeliyle hesaplanir. En guncelligi icin sayfayi yenile.
    </div>
    ${rows}`;
}

async function ensureMatches(){
  if(!allMatches.length){
    try{const r=await fetch(`/api/fixtures?date=${currentDate}`);if(r.ok){const d=await r.json();allMatches=d.matches||[];}}
    catch(e){}
  }
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}

buildDates();
loadFixtures(currentDate);
</script>
